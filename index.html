<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIKAL-Ai</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
  color: #fff;
  min-height: 100vh;
  padding: 20px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

.container {
  width: 100%;
  max-width: 650px;
  background: rgba(25, 25, 40, 0.8);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

h1 {
  font-size: 28px;
  margin-bottom: 5px;
  background: linear-gradient(90deg, #6a5acd, #00d4ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  color: #aaa;
  margin-bottom: 25px;
  font-size: 14px;
}

label {
  display: block;
  margin: 15px 0 8px;
  font-size: 14px;
  color: #ccc;
}

input, select, textarea, button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(35, 35, 50, 0.6);
  color: #fff;
  font-size: 15px;
  outline: none;
  transition: 0.2s;
}

input:focus, select:focus, textarea:focus {
  border-color: #6a5acd;
  box-shadow: 0 0 0 2px rgba(106, 90, 205, 0.3);
}

textarea {
  resize: vertical;
  min-height: 80px;
}

button {
  background: linear-gradient(90deg, #6a5acd, #836fff);
  border: none;
  font-weight: 600;
  cursor: pointer;
  margin-top: 20px;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 20px rgba(106, 90, 205, 0.4);
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.preview {
  margin-top: 15px;
  border-radius: 12px;
  overflow: hidden;
  display: none;
}

.preview img,.preview video {
  width: 100%;
  display: block;
}

#output {
  margin-top: 20px;
  text-align: center;
}

.loader {
  display: none;
  margin: 20px auto;
  border: 3px solid rgba(255,255,255,0.1);
  border-top: 3px solid #6a5acd;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
 0% { transform: rotate(0deg); }
 100% { transform: rotate(360deg); }
}

.file-input {
  position: relative;
}

.file-input input {
  opacity: 0;
  position: absolute;
  width: 100%;
  height: 100%;
  cursor: pointer;
}

.file-label {
  display: block;
  padding: 14px;
  text-align: center;
  border: 1px dashed rgba(255,255,255,0.2);
  border-radius: 12px;
  color: #aaa;
}
</style>
</head>
<body>
<div class="container">
  <h1>SIKAL-Ai</h1>
  <p class="subtitle">Freepik AI Image to Video Generator</p>

  <label>API Key Freepik</label>
  <input type="password" id="apiKey" placeholder="Masukkan API Key lu">

  <label>Pilih Tool</label>
  <select id="tool">
    <option value="kling">Kling 2.1 - Image to Video</option>
    <option value="kling-turbo">Kling 2.5 Turbo - Faster</option>
    <option value="kling-pro">Kling 2.1 Pro - Higher Quality</option>
  </select>

  <label>Upload Gambar</label>
  <div class="file-input">
    <input type="file" id="image" accept="image/*">
    <div class="file-label" id="fileLabel">Klik untuk pilih gambar</div>
  </div>
  <div class="preview" id="preview">
    <img id="previewImg">
  </div>

  <label>Prompt</label>
  <textarea id="prompt" placeholder="Contoh: kamera zoom in, angin bertiup, air mengalir"></textarea>

  <button id="generate">Generate Video</button>

  <div class="loader" id="loader"></div>
  <div id="output"></div>
</div>

<script>
const apiKeyInput = document.getElementById('apiKey');
const savedKey = localStorage.getItem('freepik_key');
if (savedKey) apiKeyInput.value = savedKey;

apiKeyInput.addEventListener('change', () => {
  localStorage.setItem('freepik_key', apiKeyInput.value);
});

document.getElementById('image').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) {
    document.getElementById('fileLabel').textContent = file.name;
    const reader = new FileReader();
    reader.onload = (e) => {
      document.getElementById('previewImg').src = e.target.result;
      document.getElementById('preview').style.display = 'block';
    };
    reader.readAsDataURL(file);
  }
});

document.getElementById('generate').addEventListener('click', async () => {
  const tool = document.getElementById('tool').value;
  const prompt = document.getElementById('prompt').value;
  const file = document.getElementById('image').files[0];
  const apiKey = apiKeyInput.value;
  const output = document.getElementById('output');
  const btn = document.getElementById('generate');
  const loader = document.getElementById('loader');

  if (!apiKey ||!file ||!prompt) {
    alert('Isi API key, upload gambar, dan isi prompt dulu');
    return;
  }

  btn.disabled = true;
  loader.style.display = 'block';
  output.innerHTML = '';

  const reader = new FileReader();
  reader.onloadend = async () => {
    const base64 = reader.result;

    try {
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tool, prompt, image: base64, apiKey })
      });

      const data = await res.json();

      if (data.error) {
        output.innerHTML = `<p style="color:#ff6b6b">Error: ${data.error}</p>`;
      } else {
        output.innerHTML = `<video src="${data.video_url}" controls autoplay loop></video>`;
      }
    } catch (err) {
      output.innerHTML = `<p style="color:#ff6b6b">Error: ${err.message}</p>`;
    }

    btn.disabled = false;
    loader.style.display = 'none';
  };
  reader.readAsDataURL(file);
});
</script>
</body>
</html>
