<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIKAL AI - Kling Video</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-slate-800 p-6 rounded-2xl shadow-xl space-y-4 border border-slate-700">
        <h1 class="text-3xl font-extrabold text-cyan-400 tracking-wide text-center">SIKAL AI</h1>
        <p class="text-xs text-center text-slate-400 uppercase tracking-widest">Kling AI Video App</p>

        <div class="space-y-1">
            <label class="text-xs font-semibold text-slate-400">🔑 API KEY FREEPIK</label>
            <input id="key" type="password" placeholder="Masukkan FPSK..." class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-cyan-400 text-center text-sm">
        </div>

        <div class="space-y-1">
            <label class="text-xs font-semibold text-slate-400">📸 FOTO UTAMA (IMAGE-TO-VIDEO)</label>
            <div class="relative w-full p-3 bg-slate-900 border border-dashed border-slate-600 rounded-xl hover:border-cyan-400 transition flex flex-col items-center justify-center cursor-pointer min-h-[100px]">
                <input id="fotoInput" type="file" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="previewImage(this)">
                <div id="uploadPlaceholder" class="text-center space-y-1">
                    <p class="text-sm text-cyan-400 font-medium">📁 Pilih atau Taruh Foto</p>
                    <p class="text-[10px] text-slate-500">Format: JPG, PNG (Maks 5MB)</p>
                </div>
                <img id="imagePreview" class="hidden max-h-32 rounded-lg mt-1 object-cover border border-slate-700">
            </div>
        </div>

        <div class="space-y-1">
            <label class="text-xs font-semibold text-slate-400">📝 PROMPT GERAKAN</label>
            <textarea id="prompt" rows="3" placeholder="Contoh: Orang berjalan melambaikan tangan lambat..." class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-cyan-400 text-sm"></textarea>
        </div>

        <button onclick="run()" id="btn" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 p-3.5 rounded-xl font-bold tracking-wide hover:opacity-90 active:scale-95 transition shadow-lg shadow-cyan-500/20 text-sm">
            GENERATE VIDEO
        </button>

        <div id="status" class="text-center text-sm font-medium text-cyan-400 hidden whitespace-pre-wrap bg-slate-900/50 p-3 rounded-xl border border-slate-700/50">Memproses ke server...</div>
    </div>

    <script>
        let base64Image = "";

        // Fungsi buat nampilin pratinjau gambar dan ubah ke Base64
        function previewImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('uploadPlaceholder').classList.add('hidden');
                    const imgPreview = document.getElementById('imagePreview');
                    imgPreview.src = e.target.result;
                    imgPreview.classList.remove('hidden');
                    base64Image = e.target.result.split(',')[1]; // Ambil data base64 murni tanpa header data:image/png
                }
                reader.readAsDataURL(file);
            }
        }

        async function run() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const key = document.getElementById('key').value.trim();
            const prompt = document.getElementById('prompt').value.trim();

            if (!key || !prompt) return alert("Isi API Key dan Prompt dulu cuy!");
            if (!base64Image) return alert("Upload fotonya dulu dong cuy biar mukanya konsisten!");

            btn.disabled = true;
            status.classList.remove('hidden');
            status.innerText = "⏳ Mengirim request lewat Proxy Vercel...";

            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        apiKey: key, 
                        prompt: prompt,
                        image: base64Image // Kita kirim fotonya dalam format teks Base64 ke server!
                    })
                });

                const data = await res.json();
                status.innerText = "Hasil API: \n" + JSON.stringify(data, null, 2);
            } catch (err) {
                status.innerText = "Error: " + err.message;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
