<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIKAL-Ai</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { 
      background: #0a0e1a; 
      color: #e2e8f0; 
      min-height: 100vh;
    }
    .header {
      background: #0f172a;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1e293b;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 20px;
      color: #3b82f6;
    }
    .status {
      padding: 6px 14px;
      background: #1e293b;
      border-radius: 20px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 20px;
    }
    .model-selector {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      overflow-x: auto;
      padding-bottom: 8px;
    }
    .model-item {
      flex-shrink: 0;
      text-align: center;
      cursor: pointer;
      opacity: 0.5;
    }
    .model-item.active {
      opacity: 1;
    }
    .model-icon {
      width: 60px;
      height: 60px;
      background: #1e293b;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 6px;
      border: 2px solid transparent;
      font-size: 24px;
    }
    .model-item.active .model-icon {
      border-color: #3b82f6;
      background: #1e3a8a;
    }
    .model-name {
      font-size: 12px;
      color: #94a3b8;
    }
    .model-item.active .model-name {
      color: #3b82f6;
    }
    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid #334155;
    }
    .card-title {
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .upload-area {
      border: 2px dashed #334155;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .upload-area:hover {
      border-color: #3b82f6;
    }
    .upload-icon {
      font-size: 40px;
      margin-bottom: 10px;
    }
    .upload-text {
      color: #94a3b8;
      font-size: 14px;
    }
    textarea, input, select {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #fff;
      font-size: 15px;
    }
    textarea {
      min-height: 100px;
      resize: vertical;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #94a3b8;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #3b82f6;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #2563eb;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .range-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    input[type="range"] {
      flex: 1;
      accent-color: #3b82f6;
    }
    video {
      width: 100%;
      border-radius: 12px;
      margin-top: 20px;
    }
    .loader {
      text-align: center;
      color: #60a5fa;
      padding: 20px;
    }
    .char-count {
      text-align: right;
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⚡ SIKAL</div>
    <div class="status">
      <div class="status-dot"></div>
      Terhubung
    </div>
  </div>

  <div class="container">
    <!-- Model Selector -->
    <div class="model-selector">
      <div class="model-item active">
        <div class="model-icon">🎬</div>
        <div class="model-name">Kling V3 Pro</div>
      </div>
    </div>

    <!-- Model Info -->
    <div class="card">
      <div class="card-title">🎬 Kling V3 Pro</div>
      <div style="color:#94a3b8; font-size:14px;">Kling V3 kualitas tertinggi — 3-15 detik</div>
    </div>

    <!-- Upload Image -->
    <div class="card">
      <div class="card-title">📷 Upload Gambar</div>
      <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept="image/*" style="display:none;">
        <div class="upload-icon">📸</div>
        <div>Klik atau drag file</div>
        <div class="upload-text">JPG, PNG, WEBP — Max 10MB</div>
      </div>
      <div style="margin-top:12px; color:#94a3b8; font-size:13px;">
        🔗 Atau masukkan URL
      </div>
    </div>

    <!-- Prompt -->
    <div class="card">
      <div class="card-title">💬 Prompt</div>
      <textarea id="prompt" placeholder="Deskripsikan yang diinginkan..." maxlength="2500"></textarea>
      <div class="char-count"><span id="charCount">0</span>/2500</div>
    </div>

    <!-- Settings -->
    <div class="card">
      <div class="card-title">⚙️ Settings</div>
      
      <div class="form-group">
        <label class="form-label">Aspect Ratio</label>
        <select id="aspectRatio">
          <option value="16:9">16:9</option>
          <option value="9:16">9:16</option>
          <option value="1:1">1:1</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Durasi</label>
        <select id="duration">
          <option value="5">5s</option>
          <option value="10">10s</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">CFG Scale <span id="cfgValue">0.5</span></label>
        <div class="range-group">
          <input type="range" id="cfgScale" min="0" max="1" step="0.1" value="0.5">
        </div>
      </div>
    </div>

    <button id="generateBtn">Generate Video</button>
    <div id="result"></div>
  </div>

  <script>
    const apiKey = localStorage.getItem('falApiKey');
    if (!apiKey) {
      window.location.href = '/';
    }

    const promptInput = document.getElementById('prompt');
    const charCount = document.getElementById('charCount');
    const cfgScale = document.getElementById('cfgScale');
    const cfgValue = document.getElementById('cfgValue');
    const generateBtn = document.getElementById('generateBtn');
    const resultDiv = document.getElementById('result');

    promptInput.addEventListener('input', () => {
      charCount.textContent = promptInput.value.length;
    });

    cfgScale.addEventListener('input', () => {
      cfgValue.textContent = cfgScale.value;
    });

    generateBtn.addEventListener('click', async () => {
      const prompt = promptInput.value.trim();
      if (!prompt) return alert('Masukin prompt dulu');

      generateBtn.disabled = true;
      resultDiv.innerHTML = '<div class="loader">Sedang generate... sabar ya</div>';

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            prompt,
            apiKey,
            aspect_ratio: document.getElementById('aspectRatio').value,
            duration: parseInt(document.getElementById('duration').value)
          })
        });

        const data = await res.json();
        if (data.error) throw new Error(data.error);
        
        pollStatus(data.request_id, apiKey);
      } catch (err) {
        resultDiv.innerHTML = `<p style="color:#ef4444">Error: ${err.message}</p>`;
        generateBtn.disabled = false;
      }
    });

    async function pollStatus(requestId, apiKey) {
      const interval = setInterval(async () => {
        const res = await fetch('/api/status', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ request_id: requestId, apiKey })
        });
        
        const data = await res.json();
        
        if (data.status === 'COMPLETED') {
          clearInterval(interval);
          resultDiv.innerHTML = `<video src="${data.video.url}" controls autoplay loop></video>`;
          generateBtn.disabled = false;
        } else if (data.status === 'FAILED') {
          clearInterval(interval);
          resultDiv.innerHTML = '<p style="color:#ef4444">Gagal generate</p>';
          generateBtn.disabled = false;
        }
      }, 3000);
    }
  </script>
</body>
        </html>
