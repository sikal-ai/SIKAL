<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SIKAL-Ai</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
  .tempered-glass {
      background: rgba(15, 23, 42, 0.65);
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 40px 0px rgba(0, 0, 0, 0.6);
    }
  .bg-gradient-custom {
      background:
        radial-gradient(circle at top right, rgba(6, 182, 212, 0.15), transparent 50%),
        radial-gradient(circle at bottom left, rgba(20, 78, 216, 0.15), transparent 50%),
        #020617;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
  .animate-fade-in {
      animation: fadeIn 0.5s ease-out forwards;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  .loader {
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #06b6d4;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: inline-block;
    }
  </style>
</head>
<body class="bg-gradient-custom text-slate-100 font-sans min-h-screen flex items-center justify-center p-4">

  <!-- LAYAR LOGIN -->
  <div id="layarLogin" class="w-full max-w-md tempered-glass p-8 rounded-2xl space-y-6 transition-all duration-500 scale-100 animate-fade-in">
    <div class="space-y-2 text-center">
      <h1 class="text-4xl font-black bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent tracking-wider">SIKAL-Ai</h1>
      <p class="text-xs text-slate-400 uppercase tracking-widest">Masukkan Kunci Akses Lu Cok</p>
    </div>
    <div class="space-y-4">
      <div class="space-y-1">
        <label class="text- font-bold text-cyan-400/80 uppercase tracking-wider">🔑 API KEY</label>
        <input id="keyInput" type="password" placeholder="Masukkan API Key..."
          class="w-full p-4 bg-slate-950/60 border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-500 transition-all">
      </div>
      <div class="space-y-1">
        <label class="text- font-bold text-cyan-400/80 uppercase tracking-wider">🎬 PILIH PROVIDER</label>
        <select id="providerSelect" class="w-full p-3 bg-slate-950/80 border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-500">
          <option value="kling">Kling AI - Video Gen</option>
          <option value="seaweed">Seaweed AI - Video Gen</option>
          <option value="magnific">Magnific AI - Image Upscale</option>
        </select>
      </div>
      <button onclick="masukBeranda()"
        class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 p-4 rounded-xl font-extrabold tracking-wider hover:scale-105 active:scale-95 transition-all duration-300 shadow-lg shadow-cyan-500/20">
        Masuk ke Beranda
      </button>
    </div>
  </div>

  <!-- LAYAR BERANDA -->
  <div id="layarBeranda" class="w-full max-w-5xl tempered-glass p-6 sm:p-8 rounded-3xl space-y-6 hidden opacity-0 transition-all duration-500">

    <!-- HEADER -->
    <div class="flex flex-col sm:flex-row justify-between items-center border-b border-slate-800/60 pb-4 gap-3">
      <div class="text-center sm:text-left">
        <h1 class="text-2xl sm:text-3xl font-black bg-gradient-to-r from-cyan-400 to-blue-400 bg-clip-text text-transparent">SIKAL-Ai</h1>
        <p class="text- text-slate-400 uppercase tracking-widest mt-0.5">Ruang Kerja Video Multi-Model Premium</p>
      </div>
      <div class="flex gap-2">
        <button onclick="switchTab('generate')" class="tab-btn active text-xs bg-cyan-500/20 text-cyan-400 font-bold py-2 px-4 rounded-lg">Generate</button>
        <button onclick="switchTab('history')" class="tab-btn text-xs bg-slate-800 text-slate-400 font-bold py-2 px-4 rounded-lg">History</button>
        <button onclick="keluarKeloin()" class="text-xs bg-slate-950/70 hover:bg-red-950/40 border-slate-800 hover:border-red-800/50 text-slate-400 hover:text-red-400 font-bold py-2 px-4 rounded-lg transition-all">Keluar</button>
      </div>
    </div>

    <!-- TAB GENERATE -->
    <div id="tab-generate" class="tab-content space-y-5">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-400 tracking-wide uppercase">🎬 Pilih Mesin Core AI</label>
          <select id="modelAI" class="w-full p-3.5 bg-slate-950/80 border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-500">
            <option value="kling-3.0">🎥 Kling AI 3.0 (Kecepatan Premium)</option>
            <option value="seaweed-2.0">🌊 Seaweed AI 2.0</option>
            <option value="magnific">🖼️ Magnific AI (Image Upscale)</option>
          </select>
        </div>

        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-400 tracking-wide uppercase">⚡ Quality/Duration</label>
          <select id="duration" class="w-full p-3.5 bg-slate-950/80 border-slate-800 rounded-xl">
            <option value="5">5 detik / Standard</option>
            <option value="10">10 detik / High</option>
          </select>
        </div>
      </div>

      <div class="space-y-1.5">
        <label class="text-xs font-bold text-slate-400 tracking-wide uppercase flex items-center gap-1">🖼️ FOTO UTAMA <span class="text-slate-600">[Opsional]</span></label>
        <div class="relative w-full p-6 bg-slate-950/50 border-2 border-dashed border-slate-800 hover:border-cyan-500/50 rounded-xl transition-all duration-300 cursor-pointer"
          ondragover="event.preventDefault()" ondrop="handleDrop(event)">
          <input type="file" accept="image/*" id="fotoInput" class="absolute inset-0 opacity-0 cursor-pointer" onchange="handleFile(event)">
          <div id="uploadPlaceholder" class="text-center space-y-2">
            <p class="text-3xl text-cyan-400">📁</p>
            <p class="text-sm text-slate-200 font-medium">Klik atau Drag & Drop Foto</p>
            <p class="text-xs text-slate-500">JPG, PNG, WEBP</p>
          </div>
          <img id="imagePreview" class="hidden max-h-64 w-auto rounded-xl object-cover border-slate-700 shadow-lg mx-auto">
        </div>
      </div>

      <div class="space-y-1.5">
        <label class="text-xs font-bold text-slate-400 tracking-wide uppercase flex justify-between">
          <span>✨ PROMPT GERAKAN</span>
          <span class="text- text-cyan-400 lowercase italic">+ auto-translate aktif</span>
        </label>
        <textarea id="prompt" rows="4" placeholder="Contoh: Kamera zoom out perlahan, karakter berjalan di jalan neon cyberpunk malam hari..."
          class="w-full p-4 bg-slate-950/80 border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-500 transition-all"></textarea>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-400 tracking-wide uppercase">📐 Resolution</label>
          <select id="resolution" class="w-full p-3.5 bg-slate-950/80 border-slate-800 rounded-xl">
            <option value="1920x1080">1920x1080 - Landscape</option>
            <option value="1080x1920">1080x1920 - Portrait</option>
            <option value="1024x1024">1024x1024 - Square</option>
          </select>
        </div>
        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-400 tracking-wide uppercase">🎨 Style</label>
          <select id="style" class="w-full p-3.5 bg-slate-950/80 border-slate-800 rounded-xl">
            <option value="realistic">Realistic</option>
            <option value="anime">Anime</option>
            <option value="art">Digital Art</option>
          </select>
        </div>
      </div>

      <div class="flex gap-3">
        <button onclick="run()" id="btn"
          class="flex-1 bg-gradient-to-r from-cyan-500 via-blue-600 to-blue-700 p-4 rounded-xl font-extrabold tracking-wider hover:scale-105 active:scale-95 transition-all duration-300 shadow-lg shadow-cyan-500/20 disabled:opacity-50 disabled:cursor-not-allowed">
          ⚡ MULAI GENERATE
        </button>
        <button onclick="checkCredits()"
          class="px-6 bg-gradient-to-r from-green-500 to-emerald-600 p-4 rounded-xl font-bold hover:scale-105 transition-all">
          💰
        </button>
      </div>

      <div id="status" class="text-left text-xs font-mono text-cyan-400 hidden whitespace-pre-wrap bg-slate-950/90 p-4 rounded-lg border-slate-800"></div>

      <div id="result" class="mt-4"></div>
    </div>

    <!-- TAB HISTORY -->
    <div id="tab-history" class="tab-content hidden space-y-4">
      <div class="flex justify-between items-center">
        <h3 class="text-lg font-bold text-slate-300">📚 History Generate</h3>
        <button onclick="clearHistory()" class="text-xs bg-red-950/40 text-red-400 px-3 py-1 rounded-lg hover:bg-red-950/60">Hapus Semua</button>
      </div>
      <div id="historyList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

  </div>

<script>
let base64Image = "";
let globalApiKey = "";
let globalProvider = "";
let history = JSON.parse(localStorage.getItem('sikal_history') || '[]');

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.remove('bg-cyan-500/20', 'text-cyan-400');
    b.classList.add('bg-slate-800', 'text-slate-400');
  });
  event.target.classList.add('bg-cyan-500/20', 'text-cyan-400');
  event.target.classList.remove('bg-slate-800', 'text-slate-400');

  document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
  document.getElementById('tab-' + tab).classList.remove('hidden');

  if (tab === 'history') loadHistory();
}

function masukBeranda() {
  const key = document.getElementById('keyInput').value.trim();
  const provider = document.getElementById('providerSelect').value;

  if (!key) {
    alert("Masukin API key dulu cok");
    return;
  }

  globalApiKey = key;
  globalProvider = provider;
  localStorage.setItem('sikal_api_key', key);
  localStorage.setItem('sikal_provider', provider);

  document.getElementById('layarLogin').classList.add('hidden', 'opacity-0', 'scale-95');
  document.getElementById('layarBeranda').classList.remove('hidden');
  setTimeout(() => {
    document.getElementById('layarBeranda').classList.remove('opacity-0');
  }, 50);
}

function keluarKeloin() {
  if (confirm('Yakin mau keluar?')) {
    localStorage.removeItem('sikal_api_key');
    localStorage.removeItem('sikal_provider');
    location.reload();
  }
}

function handleFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  processFile(file);
}

function handleDrop(event) {
  event.preventDefault();
  const file = event.dataTransfer.files[0];
  if (!file) return;
  processFile(file);
}

function processFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    base64Image = e.target.result;
    document.getElementById('imagePreview').src = base64Image;
    document.getElementById('imagePreview').classList.remove('hidden');
    document.getElementById('uploadPlaceholder').classList.add('hidden');
  };
  reader.readAsDataURL(file);
}

async function run() {
  const prompt = document.getElementById('prompt').value.trim();
  const model = document.getElementById('modelAI').value;
  const duration = document.getElementById('duration').value;
  const resolution = document.getElementById('resolution').value;
  const style = document.getElementById('style').value;
  const btn = document.getElementById('btn');
  const status = document.getElementById('status');
  const result = document.getElementById('result');

  if (!prompt) {
    alert('Masukin prompt dulu cok');
    return;
  }

  btn.disabled = true;
  status.classList.remove('hidden');
  status.innerHTML = '<span class="loader"></span> Generating... sabar ya bro';
  result.innerHTML = '';

  try {
    let res, data, url, type;

    if (model.includes('kling')) {
      const endpoint = base64Image
      ? 'https://api.klingai.com/v1/videos/image-to-video'
        : 'https://api.klingai.com/v1/videos/text-to-video';

      const body = base64Image
      ? { image: base64Image, prompt, duration: parseInt(duration) }
        : { prompt, duration: parseInt(duration), aspect_ratio: resolution === '1080x1920'? '9:16' : '16:9' };

      res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${globalApiKey}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Error Kling API');
      url = data.video_url;
      type = 'video';

    } else if (model.includes('seaweed')) {
      res = await fetch('https://api.seaweed.ai/v1/video/generate', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${globalApiKey}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt, motion: 'medium', resolution: '1080p' })
      });
      data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error Seaweed API');
      url = data.video_url;
      type = 'video';

    } else if (model.includes('magnific')) {
      res = await fetch('https://api.magnific.ai/v1/generate', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${globalApiKey}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt, resolution, style })
      });
      data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || 'Error Magnific API');
      url = data.image_url;
      type = 'image';
    }

    status.innerHTML = '✅ Selesai! Hasil udah siap';
    result.innerHTML = `
      <div class="tempered-glass p-4 rounded-xl animate-fade-in">
        ${type === 'image'
        ? `<img src="${url}" class="w-full rounded-lg">`
          : `<video src="${url}" controls autoplay loop class="w-full rounded-lg"></video>`
        }
        <button onclick="downloadFile('${url}')"
          class="mt-3 w-full bg-gradient-to-r from-green-500 to-emerald-600 p-3 rounded-lg font-bold hover:scale-105 transition-all">
          📥 Download Hasil
        </button>
      </div>
    `;

    saveHistory({ type, url, prompt, time: new Date().toLocaleString() });

  } catch (err) {
    status.innerHTML = '❌ Error: ' + err.message;
  } finally {
    btn.disabled = false;
  }
}

function saveHistory(item) {
  history.unshift(item);
  if (history.length > 20) history.pop();
  localStorage.setItem('sikal_history', JSON.stringify(history));
}

function loadHistory() {
  const list = document.getElementById('historyList');
  if (history.length === 0) {
    list.innerHTML = `<div class="col-span-2 text-center py-10 text-slate-500">Belum ada history nih</div>`;
    return;
  }
  list.innerHTML = history.map((item, i) => `
    <div class="tempered-glass p-3 rounded-xl">
      ${item.type === 'image'
      ? `<img src="${item.url}" class="w-full rounded-lg mb-2">`
        : `<video src="${item.url}" controls class="w-full rounded-lg mb-2"></video>`
      }
      <p class="text-xs text-slate-400 truncate">${item.prompt}</p>
      <p class="text- text-slate-500">${item.time}</p>
      <button onclick="downloadFile('${item.url}')" class="mt-2 w-full bg-cyan-500/20 text-cyan-400 p-2 rounded-lg text-xs font-bold">Download</button>
    </div>
  `).join('');
}

function clearHistory() {
  if (confirm('Hapus semua history?')) {
    localStorage.removeItem('sikal_history');
    history = [];
    loadHistory();
  }
}

function downloadFile(url) {
  const a = document.createElement('a');
  a.href = url;
  a.download = 'sikal-ai-result-' + Date.now();
  a.click();
}

async function checkCredits() {
  if (!globalApiKey) return alert('Login dulu cok');
  alert('Fitur cek credits jalan, tinggal connect ke API user info masing-masing provider');
}

// Auto login kalau ada key tersimpan
window.onload = () => {
  const savedKey = localStorage.getItem('sikal_api_key');
  const savedProvider = localStorage.getItem('sikal_provider');
  if (savedKey) {
    document.getElementById('keyInput').value = savedKey;
    document.getElementById('providerSelect').value = savedProvider || 'kling';
  }
};
</script>
</body>
  </html>
